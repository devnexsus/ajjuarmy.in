    <!-- 1. Particle System (background) with warm colors -->
    <script>
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const particles = [];
            const COUNT = 80;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2.5 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    // Warm hues: orange/red/gold (30-60)
                    const hue = 30 + Math.random() * 40;
                    this.color = `hsla(${hue}, 90%, 70%, ${this.opacity})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) {
                        this.reset();
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            for (let i = 0; i < COUNT; i++) {
                particles.push(new Particle());
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            const alpha = (1 - dist / 140) * 0.15;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 180, 100, ${alpha})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                for (const p of particles) {
                    p.update();
                    p.draw();
                }
                drawConnections();
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>

    <!-- 2. 3D Tilt Effect on Card -->
    <script>
        (function() {
            const card = document.getElementById('card3d');
            let bounds = card.getBoundingClientRect();

            function updateBounds() {
                bounds = card.getBoundingClientRect();
            }
            window.addEventListener('resize', updateBounds);
            window.addEventListener('scroll', updateBounds);
            updateBounds();

            card.addEventListener('mousemove', function(e) {
                const x = (e.clientX - bounds.left) / bounds.width;
                const y = (e.clientY - bounds.top) / bounds.height;
                const rotateX = (0.5 - y) * 10;
                const rotateY = (x - 0.5) * 10;
                card.style.transform =
                    `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
                card.style.transition = 'transform 0.08s ease-out';
            });

            card.addEventListener('mouseleave', function() {
                card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
                card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
        })();
    </script>
